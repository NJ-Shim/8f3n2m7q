.card{perspective:1000px}.card-inner{position:relative;width:100%;height:150px;text-align:center;transition:transform .6s;transform-style:preserve-3d;cursor:pointer}

.emoji{font-size:36px;margin-bottom:10px}.korean{font-size:21px;font-weight:bold;line-height:1.25}.pos{margin-top:6px;font-size:12px;color:#777}
.count{font-size:13px;color:#555;margin-top:4px}
